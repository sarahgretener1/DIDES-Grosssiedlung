<body class="page-index">

      <section id="content">
    <!--fenster & lichtquellen-->    
    <div class="home">    
         <a class="light-8house" href="/8 House/8-house.html" aria-label="Zur 8 House Seite"></a> <!-- Lichtquelle für 8 House -->

         <a class="light-cite_radieuse1" href="/cite radieuse/front.html" aria-label="Zur Cité Radieuse Seite"></a> <!-- Lichtquelle für Cité Radieuse -->
         <a class="light-cite_radieuse2" href="/cite radieuse/front.html" aria-label="Zur Cité Radieuse Seite"></a> <!-- Lichtquelle für Cité Radieuse -->
         <a class="light-cite_radieuse3" href="/Cité Radieuse/front.html" aria-label="Zur Cité Radieuse Seite"></a> <!-- Lichtquelle für Cité Radieuse -->

         <a class="light-plattenbau2" href="/DDR_neu/ddr.html" aria-label="Zur Plattenbau Seite"></a> <!-- Lichtquelle für plattenbau -->

            <img class="house-8" src="8House.png">
            <img class="DDR" src="DDR.png">
       
    </div>
</section>
<script>
const scrollBtn = document.querySelector('.scroll-btn');
const content = document.getElementById('content');
let maxScrollY = 0;
let minScrollY = 0;
let isUpwardScrollLocked = false;

function updateScrollBounds() {
  if (!content) return;
  maxScrollY = Math.max(0, Math.round(content.getBoundingClientRect().top + window.scrollY));
}

function enforceMaxScroll() {
  if (window.scrollY > maxScrollY) {
    window.scrollTo({ top: maxScrollY, behavior: 'auto' });
  }

  if (isUpwardScrollLocked && window.scrollY < minScrollY) {
    window.scrollTo({ top: minScrollY, behavior: 'auto' });
  }
}

function updateScrollButtonVisibility() {
  if (!scrollBtn) return;
  scrollBtn.classList.toggle('is-hidden', window.scrollY > 10);
}

function toggleProjectsDropdown(event) {
  event.stopPropagation();
  const projectsNav = document.getElementById('projectsNav');
  const trigger = projectsNav?.querySelector('.btn-gross');
  if (!projectsNav || !trigger) return;

  const isOpen = projectsNav.classList.toggle('is-open');
  trigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
}

function showContentState({ animate, smoothScroll }) {
  const headerTitle = document.querySelector('.header-title');
  const home = document.querySelector('.home');

  if (headerTitle) {
    headerTitle.classList.add('is-collapsing');
  }

  if (home) {
    home.classList.remove('scroll-animate');

    if (animate) {
      home.style.animation = '';
      home.style.opacity = '';
      home.style.transform = '';
      void home.offsetWidth;
      home.classList.add('scroll-animate');
    } else {
      home.style.animation = 'none';
      home.style.opacity = '1';
      home.style.transform = 'translateY(-20%)';
    }
  }

  if (content) {
    content.scrollIntoView({ behavior: smoothScroll ? 'smooth' : 'auto', block: 'start' });
  }

  updateScrollButtonVisibility();
}

function lockUpwardScrollAtContent() {
  updateScrollBounds();
  minScrollY = maxScrollY;
  isUpwardScrollLocked = true;
  enforceMaxScroll();
}

function scrollToContent() {
  showContentState({ animate: true, smoothScroll: true });
  window.setTimeout(lockUpwardScrollAtContent, 700);
}

window.addEventListener('DOMContentLoaded', () => {
  updateScrollBounds();

  if (window.location.hash === '#content') {
    showContentState({ animate: false, smoothScroll: false });
  }

  enforceMaxScroll();
  updateScrollButtonVisibility();
});

window.addEventListener('click', (event) => {
  const projectsNav = document.getElementById('projectsNav');
  const trigger = projectsNav?.querySelector('.btn-gross');
  if (!projectsNav || !trigger) return;
  if (!projectsNav.contains(event.target)) {
    projectsNav.classList.remove('is-open');
    trigger.setAttribute('aria-expanded', 'false');
  }
});

window.addEventListener('scroll', () => {
  enforceMaxScroll();
  updateScrollButtonVisibility();
});

window.addEventListener('resize', () => {
  updateScrollBounds();
  enforceMaxScroll();
});
</script>
<script src="/8 House/script.js"></script>
</body>
</html>
