<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="page-index">
    <!-- TOP LEFT -->

        <button class="btn-gross" type="button" onclick="window.location.href='/index.html#content'">Grosssiedlungen <span class="btn-gross-arrow" aria-hidden="true">▶</span></button>
        <button class="btn-info">Info</button>
    </div>


    <!-- Titel -->
    <div class="header-title">
        <h1>Grosssiedlungen</h1>
    </div>

    <!-- Scroll Button (fixed at page bottom) -->
    <button class="scroll-btn" type="button" onclick="scrollToContent()">
      <span class="btn-label">Wie ist es hier zu leben?</span>
      <span class="btn-arrow" aria-hidden="true">▼</span>
    </button>

      <section id="content">
    <!--fenster & lichtquellen-->    
    <div class="home">    
         <a class="light-8house" href="/8 House/8-house.html" aria-label="Zur 8 House Seite"></a> <!-- Lichtquelle für 8 House -->

         <a class="light-cite_radieuse1" href="/cite radieuse/front.html" aria-label="Zur Cité Radieuse Seite"></a> <!-- Lichtquelle für Cité Radieuse -->
         <a class="light-cite_radieuse2" href="/cite radieuse/front.html" aria-label="Zur Cité Radieuse Seite"></a> <!-- Lichtquelle für Cité Radieuse -->
         <a class="light-cite_radieuse3" href="/Cité Radieuse/front.html" aria-label="Zur Cité Radieuse Seite"></a> <!-- Lichtquelle für Cité Radieuse -->

         <a class="building-link light-nakagin1" href="/Nakagin/nakagin.html" aria-label="Zur Nakagin Seite"></a> <!-- Lichtquelle für Nakagin -->
         <a class="building-link light-nakagin2" href="/Nakagin/nakagin.html" aria-label="Zur Nakagin Seite"></a> <!-- Lichtquelle für Nakagin -->
         <a class="building-link light-nakagin3" href="/Nakagin/nakagin.html" aria-label="Zur Nakagin Seite"></a> <!-- Lichtquelle für Nakagin -->

         <a class="light-plattenbau1" href="/DDR/ddr.html" aria-label="Zur Plattenbau Seite"></a> <!-- Lichtquelle für plattenbau -->
         <a class="light-plattenbau2" href="/DDR/ddr.html" aria-label="Zur Plattenbau Seite"></a> <!-- Lichtquelle für plattenbau -->

         <a class="light-plattenbau4" href="/DDR/ddr.html" aria-label="Zur Plattenbau Seite"></a> <!-- Lichtquelle für plattenbau -->

         <img class="home-fenster" src="home-fenster.png">
       <img class="cite-radieuse" src="cité radieuse.png">
          <img class="nakagin" src="nakagin.png">
           <!-- <img class="plattenbau" src="plattenbau.png"> -->
            <img class="house-8" src="8House.png">
            <img class="DDR" src="DDR.png">
       
    </div>
</section>
<script>
const scrollBtn = document.querySelector('.scroll-btn');

function hideScrollButton() {
  if (scrollBtn) {
    scrollBtn.classList.add('is-hidden');
  }
}

function scrollToContent() {
  const content = document.getElementById('content');
  const headerTitle = document.querySelector('.header-title');
  const home = document.querySelector('.home');

  if (headerTitle) {
    headerTitle.classList.add('is-collapsing');
  }

  if (home) {
    home.classList.remove('scroll-animate');
    void home.offsetWidth;
    home.classList.add('scroll-animate');
  }

  if (content) {
    content.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  hideScrollButton();
}

window.addEventListener('scroll', () => {
  if (window.scrollY > 10) {
    hideScrollButton();
  }
});
</script>
<script src="/8 House/script.js"></script>
</body>
</html>
