<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Squada+One&display=swap" rel="stylesheet">
  <style>
    .navbar {
      width: 276px;
      height: 54px;
      position: fixed;
      background: black;
    }

    .navbar__label {
      width: 190px;
      height: 32px;
      position: absolute;
      left: 15.61px;
      top: 11px;
      background: white;
    }

    .navbar__title {
      width: 184.78px;
      height: 30.80px;
      position: absolute;
      left: 21px;
      top: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: black;
      font-size: 24px;
      font-family: 'Squada One', sans-serif;
      font-weight: 400;
      word-wrap: break-word;
    }

    .navbar__info {
      width: 45.31px;
      height: 30.80px;
      position: absolute;
      left: 218px;
      top: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      color: white;
      font-size: 24px;
      font-family: 'Squada One', sans-serif;
      font-weight: 400;
      word-wrap: break-word;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="navbar__label"></div>
    <div class="navbar__title">Alle Projekte</div>
    <div class="navbar__info">Infos</div>
  </div>

</body>
</html>
