<!DOCTYPE html>
<html>
  <head>
    <title>front</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
      #street-view-iframe {
        position: fixed;
        left: 0; top: 0;
        width: 100vw;
        height: 100vh;
        border: none;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <!-- TOP LEFT -->
    <div class="ui-top-left">
        <button class="btn-gross">Grosssiedlungen</button>
        <button class="btn-info">Info</button>
    </div>

    <!-- TOP RIGHT -->
    <div class="ui-top-right">

            <div class="dropdown-row" id="row1" onclick="toggleDropdown('content1','row1')">
                <div class="dropdown-ticker-wrap">
                    <span class="dropdown-ticker">Cité Radieuse • Le Corbusier • 1952 • Marseille • Brutalismus •</span>
                </div>
                <div class="dropdown-arrow">▼</div>
            </div>
            <div class="dropdown-content" id="content1">
                Die Cité Radieuse in Marseille ist eines der bekanntesten Wohngebäude von Le Corbusier. </div>

            <div class="dropdown-row" id="row2" onclick="toggleDropdown('content2','row2')">
                <div class="dropdown-ticker-wrap">
                    <span class="dropdown-ticker">Unité d'Habitation • Modulor • Pilotis • </span>
                </div>
                <div class="dropdown-arrow">▼</div>
            </div>
            <div class="dropdown-content" id="content2">
                Le Corbusier prägte die Architektur des 20. Jahrhunderts mit seinen Ideen zur Wohnform.
            </div>
        </div>
    </div>

    <!-- STREET VIEW als IFRAME (kein JS/API!) -->
    <iframe
      id="street-view-iframe"
      src="https://www.google.com/maps/embed?pb=!4v1779387583015!6m8!1m7!1sCAoSF0NJSE0wb2dLRUlDQWdJRDRsWUwwamdF!2m2!1d43.26125319476246!2d5.396754010485897!3f280.3709766378171!4f44.660020004767404!5f0.7820865974627469"
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      title="Street View Cité Radieuse">
    </iframe>

    <script>
      function toggleDropdown(contentId, rowId) {
        const content = document.getElementById(contentId);
        const row = document.getElementById(rowId);
        content.classList.toggle('open');
        row.classList.toggle('open');
      }
    </script>
  </body>
</html>
