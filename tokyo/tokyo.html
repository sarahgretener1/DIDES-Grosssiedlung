<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>3D Würfel – nur horizontal drehbar</title>
  <link rel="stylesheet" href="../styles.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body { margin: 0; }
    model-viewer { width: 100vw; height: 100vh; background: #fff; }
  </style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <model-viewer
    id="cube"
    src="würfelblend2.glb"
    alt="3D Würfel"
    camera-controls
    auto-rotate
    disable-pan
    style="background: #fff;">
  </model-viewer>
  <script>
    const viewer = document.getElementById('cube');
    let radius, theta;

    // Beim ersten Klick (Drag-Start): Speichere Abstand (radius)
    viewer.addEventListener('mousedown', () => {
      const orbit = viewer.getCameraOrbit();
      radius = orbit.radius;
    });

    // Nach jeder Interaktion nur horizontalen Winkel zulassen
    viewer.addEventListener('camera-change', () => {
      const orbit = viewer.getCameraOrbit();
      theta = orbit.theta;
      // Setze phi (vertikal) immer auf 90 grad (also gerade horizontal)
      viewer.cameraOrbit = `${theta} 90deg ${radius || orbit.radius}`;
    });
  </script>
</body>
</html>
